openapi: "3.0.0"
info:
  title: User Order API
  version: "1.0.0"

paths:
  /users:
    post:
      operationId: createUser
      summary: Create a user
      responses:
        "201":
          description: User created

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User fetched

    delete:
      operationId: deleteUser
      summary: Delete user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted

  /orders:
    post:
      operationId: createOrder
      summary: Create order for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Order created

  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order fetched

    put:
      operationId: updateOrder
      summary: Update order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order updated

    delete:
      operationId: deleteOrder
      summary: Delete order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Order deleted